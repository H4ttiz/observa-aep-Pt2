<fieldset class="endereco-fieldset" [formGroup]="form">
  <legend class="endereco-legend">
    <span>Endereço</span>
  </legend>

  <!-- CEP -->
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">CEP <span class="required">*</span></label>
      <div class="cep-wrap">
        <input class="form-input"
               [class.input-error]="err('cep')"
               type="text"
               formControlName="cep"
               placeholder="00000-000"
               maxlength="9"
               (input)="onCepInput($event)"
               autocomplete="postal-code" />
        <span *ngIf="buscandoCep" class="cep-loading">Buscando…</span>
      </div>
      <span *ngIf="erroCep" class="field-error">CEP não encontrado.</span>
      <span *ngIf="err('cep')" class="field-error">{{ err('cep') }}</span>
    </div>
  </div>

  <!-- Logradouro + Número -->
  <div class="form-row two-cols">
    <div class="form-group flex-2">
      <label class="form-label">Logradouro <span class="required">*</span></label>
      <input class="form-input"
             [class.readonly]="autoPreenchido"
             [class.input-error]="err('logradouro')"
             type="text"
             formControlName="logradouro"
             placeholder="Rua, Avenida, etc."
             autocomplete="street-address" />
      <span *ngIf="err('logradouro')" class="field-error">{{ err('logradouro') }}</span>
    </div>

    <div class="form-group">
      <label class="form-label">Número <span class="required">*</span></label>
      <input class="form-input"
             [class.input-error]="err('numero')"
             type="text"
             formControlName="numero"
             placeholder="Nº"
             maxlength="20"
             #numeroInput />
      <span *ngIf="err('numero')" class="field-error">{{ err('numero') }}</span>
    </div>
  </div>

  <!-- Complemento -->
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Complemento <span class="muted-label">(opcional)</span></label>
      <input class="form-input"
             type="text"
             formControlName="complemento"
             placeholder="Apto, Bloco, etc." />
    </div>
  </div>

  <!-- Bairro + Cidade + UF -->
  <div class="form-row three-cols">
    <div class="form-group flex-2">
      <label class="form-label">Bairro <span class="required">*</span></label>
      <input class="form-input"
             [class.readonly]="autoPreenchido"
             [class.input-error]="err('bairro')"
             type="text"
             formControlName="bairro"
             placeholder="Bairro" />
      <span *ngIf="err('bairro')" class="field-error">{{ err('bairro') }}</span>
    </div>

    <div class="form-group flex-2">
      <label class="form-label">Cidade <span class="required">*</span></label>
      <input class="form-input"
             [class.readonly]="autoPreenchido"
             [class.input-error]="err('cidade')"
             type="text"
             formControlName="cidade"
             placeholder="Cidade" />
      <span *ngIf="err('cidade')" class="field-error">{{ err('cidade') }}</span>
    </div>

    <div class="form-group">
      <label class="form-label">UF <span class="required">*</span></label>
      <select class="form-input form-select"
              [class.readonly]="autoPreenchido"
              [class.input-error]="err('estado')"
              formControlName="estado">
        <option value="">UF</option>
        <option *ngFor="let uf of ufs" [value]="uf">{{ uf }}</option>
      </select>
      <span *ngIf="err('estado')" class="field-error">{{ err('estado') }}</span>
    </div>
  </div>
</fieldset>
